  <text x="515" y="390" fill="#f97316" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-style="italic">π(y)</text>
  <text x="315" y="560" fill="#f97316" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-style="italic">Π</text>
  <text x="360" y="560" fill="#f97316" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-style="italic">π(y)(u,u)</text>

