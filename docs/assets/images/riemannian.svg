<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Estimating Riemannian Quantities illustration</title>
  <desc id="desc">A noisy point cloud around a curved manifold with tangent and normal projections, highlighting geometric quantities.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>

  <g opacity="0.55" filter="url(#soft)">
